spring.application.name=smart-home-api
# TTL for the per-device battery cache key (devices:{provider}:{id}:battery).
# A small multiple of the polling interval so an offline device lets its value expire (#191).
smart-home.cache.battery-ttl=5m
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=readinessState,db
