services:

  smart-home-db:
    image: "timescale/timescaledb:latest-pg16"
    container_name: smart-home-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_HOST_PORT}:5432"
    networks:
      - backend-db
    volumes:
      - /mnt/HC_Volume_103729177/postgres_data:/var/lib/postgresql/data
      - /mnt/HC_Volume_103729177/postgres_backups:/var/lib/postgresql/backups
    environment:
      - TZ=Europe/Rome
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    command: >
      postgres
      -c shared_buffers=384MB
      -c effective_cache_size=1152MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=16MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    mem_limit: 1536M
    mem_reservation: 512M
    cpus: 1.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  smart-home-cache:
    image: "redis:7.2-alpine"
    container_name: smart-home-cache
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CACHE_HOST_PORT}:6379"
    networks:
      - backend-cache
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - /mnt/HC_Volume_103729177/redis_data:/data
    mem_limit: 256M
    mem_reservation: 64M
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  smart-home-api:
    image: "${APP_IMAGE_TAG:-agrfesta/smart-home-api:1.3.1}"
    container_name: smart-home-api
    restart: unless-stopped
    mem_limit: 768M
    mem_reservation: 384M
    cpus: 1.0
    networks:
      - backend-db
      - backend-cache
      - frontend
    depends_on:
      smart-home-db:
        condition: service_healthy
      smart-home-cache:
        condition: service_healthy
    environment:
      - TZ=Europe/Rome
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Xss256k
      - SPRING_DATASOURCE_URL=jdbc:postgresql://smart-home-db:5432/${POSTGRES_DB:-${POSTGRES_USER}}
      - SPRING_DATASOURCE_PLATFORM=postgres
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATA_REDIS_HOST=smart-home-cache
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECURITY_APITOKENHASH=${API_TOKEN_HASH}
      - PROVIDERS_SWITCHBOT_ENABLED=true
      - PROVIDERS_SWITCHBOT_BASEURL=https://api.switch-bot.com/v1.1
      - PROVIDERS_SWITCHBOT_TOKEN=${PROVIDERS_SWITCHBOT_TOKEN}
      - PROVIDERS_SWITCHBOT_SECRET=${PROVIDERS_SWITCHBOT_SECRET}
      - PROVIDERS_NETATMO_ENABLED=true
      - PROVIDERS_NETATMO_BASEURL=https://api.netatmo.com
      - PROVIDERS_NETATMO_CLIENTID=${PROVIDERS_NETATMO_CLIENTID}
      - PROVIDERS_NETATMO_CLIENTSECRET=${PROVIDERS_NETATMO_CLIENTSECRET}
      - PROVIDERS_NETATMO_HOMEID=${PROVIDERS_NETATMO_HOMEID}
      - PROVIDERS_NETATMO_ROOMID=${PROVIDERS_NETATMO_ROOMID}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: "caddy:2.7-alpine"
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    environment:
      - TZ=Europe/Rome
      - CADDY_EMAIL=${CADDY_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 256M
    mem_reservation: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  frontend:
    driver: bridge
  backend-db:
    driver: bridge
  backend-cache:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
